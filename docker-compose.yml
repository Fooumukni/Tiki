services:
  postgres_app:
    image: postgres:16-alpine
    container_name: tiki_postgres_app
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_APP_DB:-tiki_app}
      POSTGRES_USER: ${POSTGRES_APP_USER:-tiki_app}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD:-}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    networks:
      - tiki_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_keycloak:
    image: postgres:16-alpine
    container_name: tiki_postgres_keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DB:-tiki_keycloak}
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER:-tiki_keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:-}
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    networks:
      - tiki_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tiki_redis
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"; else redis-server --appendonly yes; fi",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - tiki_network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: tiki_keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres_keycloak
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${POSTGRES_KEYCLOAK_DB:-tiki_keycloak}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER:-tiki_keycloak}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:-}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KEYCLOAK_BASE_URL:-https://api.example.com/auth}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres_keycloak:
        condition: service_healthy
    networks:
      - tiki_network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/9000'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tiki_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_PORT: ${BACKEND_PORT:-3100}
      APP_PORT: ${BACKEND_PORT:-3100}
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-tiki_app}:${POSTGRES_APP_PASSWORD:-}@postgres_app:5432/${POSTGRES_APP_DB:-tiki_app}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ""
      KEYCLOAK_BASE_URL: ${APP_BASE_URL:-https://api.example.com}/auth
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-tiki}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID:-tiki-frontend}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID:-tiki-api}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-tiki-api}
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-https://api.example.com/auth/realms/tiki}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-https://api.example.com/auth/realms/tiki/protocol/openid-connect/certs}
      FRONTEND_URL: ${FRONTEND_URL:-https://<github-user>.github.io}
      APP_CORS_ORIGIN: ${APP_CORS_ORIGIN:-https://<github-user>.github.io}
      APP_BASE_URL: ${APP_BASE_URL:-https://api.example.com}
    expose:
      - "3100"
    depends_on:
      postgres_app:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - tiki_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3100/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: tiki_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - tiki_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_app_data:
  postgres_keycloak_data:
  redis_data:

networks:
  tiki_network:
    driver: bridge
