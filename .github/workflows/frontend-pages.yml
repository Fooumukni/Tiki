name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tiki-github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular for GitHub Pages
        run: npm run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Detect Angular output directory
        run: |
          BUILD_INDEX=$(find frontend/dist -name index.html -path "*/browser/index.html" -print -quit)
          if [ -z "$BUILD_INDEX" ]; then
            BUILD_INDEX=$(find frontend/dist -name index.html -print -quit)
          fi
          if [ -z "$BUILD_INDEX" ]; then
            echo "No index.html found in frontend/dist"
            exit 1
          fi
          BUILD_DIR=$(dirname "$BUILD_INDEX")
          cp "$BUILD_DIR/index.html" "$BUILD_DIR/404.html"
          cat > "$BUILD_DIR/assets/app-config.js" <<EOF
          window.__APP_CONFIG__ = {
            apiBaseUrl: '${{ vars.TIKI_API_BASE_URL || 'http://146.181.61.24/api' }}',
            keycloak: {
              url: '${{ vars.TIKI_KEYCLOAK_URL || 'http://146.181.61.24/auth' }}',
              realm: '${{ vars.TIKI_KEYCLOAK_REALM || 'tiki' }}',
              clientId: '${{ vars.TIKI_KEYCLOAK_CLIENT_ID || 'tiki-frontend' }}'
            }
          };
          EOF
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
